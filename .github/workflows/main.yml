name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller python-docx
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name "Controle_Biblioteca" controle_biblioteca.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v2
      with:
        name: Controle_Biblioteca.exe
        path: dist/Controle_Biblioteca.exe
